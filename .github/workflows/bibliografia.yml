name: Bibliografia do DOCX

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  convert:
    if: ${{ startsWith(github.event.issue.title, 'BIBLIOGRAFIA') && !contains(github.event.issue.body, 'DOCX_BASE64_BEGIN') }}
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Utwórz DOCX z treści issue
        run: python issue_to_docx.py

      - name: Wstaw DOCX jako base64 do issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          export DOCX_PATH="outputs/issue-${ISSUE_NUMBER}/bibliografia.docx"

          if [ ! -f "$DOCX_PATH" ]; then
            echo "Nie znaleziono pliku: $DOCX_PATH"
            exit 1
          fi

          python -c "import base64, os; from pathlib import Path; p=Path(os.environ['DOCX_PATH']); b64=base64.b64encode(p.read_bytes()).decode('ascii'); Path('issue_body.txt').write_text('DOCX_BASE64_BEGIN\n' + b64 + '\nDOCX_BASE64_END\n', encoding='utf-8')"

          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --body-file issue_body.txt
