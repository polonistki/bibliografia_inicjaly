name: Bibliografia do DOCX

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  convert:
    if: startsWith(github.event.issue.title, 'BIBLIOGRAFIA')
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Utwórz DOCX z treści issue
        run: python issue_to_docx.py

      - name: Wstaw DOCX jako base64 do issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          DOCX_PATH="outputs/issue-${ISSUE_NUMBER}/bibliografia.docx"

          BASE64_DOCX=$(base64 -w 0 "$DOCX_PATH")

          cat > issue_body.txt <<EOF
DOCX_BASE64_BEGIN
${BASE64_DOCX}
DOCX_BASE64_END
EOF

          gh issue edit "$ISSUE_NUMBER" --body-file issue_body.txt
